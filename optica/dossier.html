<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Optica — Dossier</title>
  <meta name="description" content="Досье Optica." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
</head>
<body>
  <div class="fire-room"></div>
  <div class="shell">
    <section class="hero glass">
      <div class="hero-copy">
        <div>
          <div class="badge">optica / dossier</div>
          <h1 id="dossier-title">Загрузка…</h1>
          <p class="hero-text" id="dossier-lead"></p>
        </div>
        <div class="hero-meta" id="dossier-chips"></div>
      </div>
      <div class="hero-visual">
        <button class="lens-wrap lens-button" id="lens-button" type="button" aria-label="Сменить оптику">
          <div class="lens-halo"></div>
          <div class="lens-rim"></div>
          <div class="lens-core"></div>
          <div class="lens-gloss"></div>
          <div class="lens-sheen"></div>
          <div class="lens-fire"></div>
          <div class="lens-flame"></div>
          <div class="lens-blue"></div>
          <div class="lens-line"></div>
          <div class="lens-pulse"></div>
        </button>
        <div class="quote-plate">
          <small>оптика досье</small>
          <p id="hero-quote"></p>
        </div>
      </div>
    </section>

    <main class="sections">
      <section class="asym" id="top-sections"></section>
      <section class="split" id="summary-cards"></section>
      <section class="board glass" id="board-root"></section>
      <section class="method glass">
        <span class="eyebrow">таблица досье</span>
        <div class="table-wrap">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./scripts/render-dossier.js"></script>
</body>
</html>
